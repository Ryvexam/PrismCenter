name: Validate hyperscale source migration

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check migration script syntax
        run: node --check scripts/apply-hyperscale-ui.mjs

      - name: Normalize deterministic README input
        run: sed -i "s/capacités d'accueil réseau/capacités d’accueil réseau/" README.md

      - name: Generate hyperscale source
        run: node scripts/apply-hyperscale-ui.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate production build
        run: npm run build

      - name: Check generated diff
        run: git diff --check

      - name: Upload validated source
        uses: actions/upload-artifact@v4
        with:
          name: hyperscale-validated-source
          path: |
            src/main.jsx
            src/data/indices.js
            README.md
            package.json
          if-no-files-found: error
          retention-days: 1
